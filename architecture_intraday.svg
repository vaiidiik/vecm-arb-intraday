  <line x1="525" y1="717" x2="525" y2="742" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="75" y="742" width="900" height="62" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="525" y="766" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#4a148c">backtest_intraday.py — PortfolioBacktester</text>
  <text x="525" y="785" font-size="11.5" text-anchor="middle" fill="#6a1b9a">square-root market impact (ADV-based) · maker/taker fees · short borrow cost · P&amp;L, drawdown, Sharpe</text>

  <line x1="350" y1="804" x2="300" y2="828" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="804" x2="760" y2="828" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="110" y="828" width="380" height="55" rx="8" fill="#e0f2f1" stroke="#00695c" stroke-width="1.5"/>
  <text x="300" y="851" font-size="13" font-weight="bold" text-anchor="middle" fill="#004d40">capacity_analysis_intraday.py</text>
  <text x="300" y="868" font-size="11" text-anchor="middle" fill="#00695c">AUM sweep → capacity ceiling</text>

  <rect x="560" y="828" width="380" height="55" rx="8" fill="#e0f2f1" stroke="#00695c" stroke-width="1.5"/>
  <text x="750" y="851" font-size="13" font-weight="bold" text-anchor="middle" fill="#004d40">report_intraday.py · plot_graph.py</text>
  <text x="750" y="868" font-size="11" text-anchor="middle" fill="#00695c">tear sheet, equity curve, drawdown</text>

