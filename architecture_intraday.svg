  <text x="760" y="338" font-size="13" font-weight="bold" text-anchor="middle" fill="#a1690b">vecm_main_intraday.py</text>
  <text x="760" y="355" font-size="11" text-anchor="middle" fill="#a1690b">generate_weight_trajectory() — batch loop</text>

