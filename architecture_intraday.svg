  <text x="290" y="418" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d47a1">broker_intraday.py</text>
  <text x="290" y="435" font-size="11" text-anchor="middle" fill="#1565c0">ZeroMQ SUB — syncs 6 tickers by timestamp</text>

  <line x1="290" y1="450" x2="290" y2="475" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="120" y="475" width="340" height="55" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="290" y="498" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d47a1">strategy_engine_intraday.py</text>
  <text x="290" y="515" font-size="11" text-anchor="middle" fill="#1565c0">VECMStrategyEngine — async tick handler</text>

  <line x1="290" y1="530" x2="450" y2="575" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="575" width="850" height="55" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="525" y="597" font-size="13.5" font-weight="bold" text-anchor="middle" fill="#1b5e20">vecm_model_intraday.py</text>
  <text x="525" y="616" font-size="11.5" text-anchor="middle" fill="#2e7d32">Johansen test (6-asset + pairwise) · VECM hedge ratio β / speed-of-adjustment α · RSI · MACD · rolling z-score</text>

  <line x1="525" y1="630" x2="525" y2="655" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="75" y="655" width="900" height="62" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
