<svg viewBox="0 0 1050 950" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1050" height="950" fill="#ffffff"/>

  <text x="525" y="34" font-size="23" font-weight="bold" text-anchor="middle" fill="#1a1a1a">VECM-ARB — System Architecture</text>
  <text x="525" y="55" font-size="12.5" text-anchor="middle" fill="#666666">Six-asset intraday statistical arbitrage — JPM, BAC, C, WFC, GS, MS — Johansen cointegration + convex portfolio optimization</text>

  <rect x="300" y="75" width="450" height="48" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.5"/>
  <text x="525" y="95" font-size="13" font-weight="bold" text-anchor="middle" fill="#333333">Alpaca API — 15-min OHLCV bars</text>
  <text x="525" y="112" font-size="11" text-anchor="middle" fill="#666666">Raw ticks, 2020 - 2025</text>

  <line x1="525" y1="123" x2="290" y2="150" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="525" y1="123" x2="760" y2="150" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="120" y="150" width="340" height="55" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.5"/>
  <text x="290" y="173" font-size="13" font-weight="bold" text-anchor="middle" fill="#333333">clean_rth.py</text>
  <text x="290" y="190" font-size="11" text-anchor="middle" fill="#666666">RTH filter, forward-fill gaps</text>

  <rect x="590" y="150" width="340" height="55" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.5"/>
  <text x="760" y="173" font-size="13" font-weight="bold" text-anchor="middle" fill="#333333">data_prep_intraday.py</text>
  <text x="760" y="190" font-size="11" text-anchor="middle" fill="#666666">split-adjust, rolling dollar ADV</text>

  <line x1="290" y1="205" x2="400" y2="240" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="760" y1="205" x2="650" y2="240" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="260" y="240" width="530" height="46" rx="6" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="525" y="268" font-size="12" text-anchor="middle" fill="#444444">sample_prices_intraday.csv  ·  sample_dollar_adv_intraday.csv</text>

  <line x1="380" y1="286" x2="290" y2="315" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="286" x2="760" y2="315" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="290" y="308" font-size="11" font-style="italic" text-anchor="middle" fill="#888888">live simulation</text>
  <text x="760" y="308" font-size="11" font-style="italic" text-anchor="middle" fill="#888888">batch backtest</text>

  <rect x="120" y="315" width="340" height="55" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="290" y="338" font-size="13" font-weight="bold" text-anchor="middle" fill="#0d47a1">data_intraday.py</text>
  <text x="290" y="355" font-size="11" text-anchor="middle" fill="#1565c0">ZeroMQ PUB — simulated live ticks</text>

